<!DOCTYPE html>
<html>

<head>

<title>Meeting Dashboard</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:40px;
color:white;
}

.container{
max-width:900px;
margin:auto;
}

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.stat{
flex:1;
background:white;
color:#333;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card{
background:white;
color:#333;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:30px;
}

a{
color:white;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>📊 AI Meeting Dashboard</h1>

<div class="stats">

<div class="stat">
<h2>{{total_meetings}}</h2>
<p>Total Meetings</p>
</div>

<div class="stat">
<h2>{{total_words}}</h2>
<p>Total Words Processed</p>
</div>

<div class="stat">
<h2>{{reduction}}%</h2>
<p>Average Reduction</p>
</div>

</div>

<div class="card">

<h2>Recent Meetings</h2>

<ul>

{% for meeting in recent %}

<li>{{meeting[0]}} — {{meeting[1]}}</li>

{% endfor %}

</ul>

</div>

<br>

<a href="/">⬅ Back to Home</a>

</div>

</body>

</html>
